<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Trimmer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">⚡ Trimmer</a>
      <ul class="nav-links">
        <li><button id="theme-toggle-btn" class="theme-toggle">☀️</button></li>
      </ul>
    </div>
  </header>

  <main class="auth-container">
    <div class="panel auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join Trimmer today and get professional analytics on all links</p>

      <div id="alert-box" class="alert alert-danger" style="display: none;"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
          <span style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
            Must contain at least 8 characters, 1 uppercase, 1 lowercase, 1 number, and 1 symbol.
          </span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Trimmer URL Shortener. Built with clean Node.js and MongoDB Atlas architecture.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    // Guest route guard
    guardGuestRoute();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alert-box');
      
      alertBox.style.display = 'none';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        
        const data = await res.json();
        
        if (!res.ok || !data.success) {
          alertBox.innerText = data.message || 'Registration failed. Please satisfy password criteria.';
          alertBox.style.display = 'block';
          return;
        }

        // Store JWT token and User Details
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.data.user));

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (error) {
        alertBox.innerText = 'Unable to connect to the server. Please try again later.';
        alertBox.style.display = 'block';
        console.error('Registration error:', error);
      }
    });
  </script>
</body>
</html>
